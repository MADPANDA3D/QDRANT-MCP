name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run pre-commit
        run: uv run --python 3.12 --group dev pre-commit run --all-files

      - name: Run tests
        run: uv run --python 3.12 --group dev pytest

      - name: Build Docker image
        run: docker build -t mad-mcp-qdrant:ci .
